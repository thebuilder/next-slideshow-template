<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Slideshow Template Capabilities</title>
  <desc id="desc">Abstract diagram highlighting navigation, steps, backgrounds, fullscreen mode, and image slides.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="panel" x1="200" y1="120" x2="980" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.28"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect x="120" y="110" width="960" height="580" rx="36" fill="url(#panel)" stroke="#94A3B8" stroke-opacity="0.35"/>
  <rect x="180" y="180" width="280" height="120" rx="18" fill="#0B1220" stroke="#60A5FA" stroke-opacity="0.7"/>
  <rect x="510" y="180" width="510" height="120" rx="18" fill="#0B1220" stroke="#38BDF8" stroke-opacity="0.7"/>
  <rect x="180" y="340" width="390" height="120" rx="18" fill="#0B1220" stroke="#818CF8" stroke-opacity="0.7"/>
  <rect x="610" y="340" width="410" height="120" rx="18" fill="#0B1220" stroke="#22D3EE" stroke-opacity="0.7"/>
  <rect x="180" y="500" width="840" height="120" rx="18" fill="#0B1220" stroke="#34D399" stroke-opacity="0.7"/>
  <g fill="#E2E8F0" font-family="ui-sans-serif, system-ui" font-size="28" font-weight="600">
    <text x="215" y="252">Navigation</text>
    <text x="544" y="252">Command Center</text>
    <text x="215" y="412">Step Reveals</text>
    <text x="643" y="412">Backgrounds</text>
    <text x="215" y="572">Fullscreen + Image Slides</text>
  </g>
</svg>
